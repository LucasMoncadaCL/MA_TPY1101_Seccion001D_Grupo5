services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JOOQ_DB_URL: ${JOOQ_DB_URL}
        JOOQ_DB_USER: ${JOOQ_DB_USER}
        JOOQ_DB_PASSWORD: ${JOOQ_DB_PASSWORD}
    container_name: panol-backend
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      APP_DB_ENV: supabase
    volumes:
      - ./secrets:/app/secrets:ro
    ports:
      - "${APP_PORT:-8080}:8080"
