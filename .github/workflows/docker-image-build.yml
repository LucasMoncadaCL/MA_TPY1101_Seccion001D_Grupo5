name: Docker Image Build

on:
  pull_request:

jobs:
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: panol_ci
          POSTGRES_PASSWORD: panol_ci
          POSTGRES_DB: panol_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U panol_ci -d panol_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Guardrails - block legacy vocabulary
        run: |
          set -euo pipefail
          if rg -n -i "m[o]ngo(db)?|n[o]sql" Producto/backendpanol/src/main Producto/frontendpanol/src Producto/backendpanol/docs; then
            echo "Legacy storage vocabulary found."
            exit 1
          fi
          if rg -n "c[o]nsumable|r[e]usable|PR[O]CESSED" Producto/backendpanol/src/main Producto/frontendpanol/src Producto/backendpanol/docs; then
            echo "Legacy enum/status vocabulary found."
            exit 1
          fi

      - name: Initialize schema for jOOQ codegen (V25)
        env:
          PGPASSWORD: panol_ci
        run: |
          psql -v ON_ERROR_STOP=1 \
            -h 127.0.0.1 -U panol_ci -d panol_ci \
            -f Producto/backendpanol/src/main/resources/db/migration/v25/V25__schema_alignment_big_bang.sql

      - name: Generate jOOQ sources (host build)
        env:
          JOOQ_DB_URL: jdbc:postgresql://127.0.0.1:5432/panol_ci?sslmode=disable
          JOOQ_DB_USER: panol_ci
          JOOQ_DB_PASSWORD: panol_ci
        run: |
          cd Producto/backendpanol
          chmod +x ./mvnw
          ./mvnw -q -DskipTests generate-sources

      - name: Build backend image
        run: |
          docker build \
            --add-host=host.docker.internal:host-gateway \
            --build-arg JOOQ_DB_URL=jdbc:postgresql://host.docker.internal:5432/panol_ci \
            --build-arg JOOQ_DB_USER=panol_ci \
            --build-arg JOOQ_DB_PASSWORD=panol_ci \
            -t backendpanol:ci \
            ./Producto/backendpanol

      - name: Build frontend image
        run: |
          docker build \
            -t frontendpanol:ci \
            ./Producto/frontendpanol
