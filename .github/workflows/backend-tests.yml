name: Backend Tests

on:
  pull_request:

jobs:
  backend-tests:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: panol_ci
          POSTGRES_PASSWORD: panol_ci
          POSTGRES_DB: panol_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U panol_ci -d panol_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Guardrails - block legacy vocabulary
        run: |
          set -euo pipefail
          if rg -n -i "m[o]ngo(db)?|n[o]sql" Producto/backendpanol/src/main Producto/frontendpanol/src Producto/backendpanol/docs; then
            echo "Legacy storage vocabulary found."
            exit 1
          fi
          if rg -n "c[o]nsumable|r[e]usable|PR[O]CESSED" Producto/backendpanol/src/main Producto/frontendpanol/src Producto/backendpanol/docs; then
            echo "Legacy enum/status vocabulary found."
            exit 1
          fi

      - name: Initialize schema for jOOQ codegen (V25)
        env:
          PGPASSWORD: panol_ci
        run: |
          psql -v ON_ERROR_STOP=1 \
            -h 127.0.0.1 -U panol_ci -d panol_ci \
            -f Producto/backendpanol/src/main/resources/db/migration/v25/V25__schema_alignment_big_bang.sql

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw
        working-directory: Producto/backendpanol

      - name: Generate jOOQ sources
        env:
          JOOQ_DB_URL: jdbc:postgresql://127.0.0.1:5432/panol_ci
          JOOQ_DB_USER: panol_ci
          JOOQ_DB_PASSWORD: panol_ci
        run: ./mvnw -B generate-sources
        working-directory: Producto/backendpanol

      - name: Run backend tests
        env:
          JOOQ_DB_URL: jdbc:postgresql://127.0.0.1:5432/panol_ci
          JOOQ_DB_USER: panol_ci
          JOOQ_DB_PASSWORD: panol_ci
        run: ./mvnw -B test -Djooq.codegen.skip=true
        working-directory: Producto/backendpanol
